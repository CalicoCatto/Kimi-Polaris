<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <title>Kimi Polaris</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 260px;
      font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
      font-size: 13px;
      color: #c4cde0;
      background: #0d0d1c;
    }

    /* ── Header ──────────────────────────────────────────────────────────────── */
    .header {
      padding: 16px 16px 14px;
      border-bottom: 1px solid rgba(99, 102, 241, 0.14);
      background: linear-gradient(150deg, rgba(99,102,241,0.10) 0%, rgba(139,92,246,0.05) 100%);
      position: relative;
      overflow: hidden;
    }

    /* Decorative symbols in top-right corner */
    .header::before {
      content: '✦';
      position: absolute;
      top: 10px;
      right: 16px;
      font-size: 11px;
      color: rgba(245, 158, 11, 0.50);
      text-shadow: 0 0 8px rgba(245, 158, 11, 0.55);
      pointer-events: none;
    }
    .header::after {
      content: '☽';
      position: absolute;
      top: 8px;
      right: 32px;
      font-size: 10px;
      color: rgba(129, 140, 248, 0.45);
      text-shadow: 0 0 8px rgba(129, 140, 248, 0.55);
      pointer-events: none;
    }

    .header-inner {
      display: flex;
      align-items: center;
      gap: 11px;
    }

    .logo {
      width: 34px;
      height: 34px;
      border-radius: 11px;
      background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      flex-shrink: 0;
      box-shadow:
        0 0 12px rgba(99, 102, 241, 0.50),
        0 0 28px rgba(99, 102, 241, 0.18);
    }

    .app-name {
      font-size: 14px;
      font-weight: 600;
      color: #e2e8f0;
      line-height: 1.2;
      letter-spacing: 0.2px;
    }

    .app-version {
      font-size: 10px;
      color: rgba(129, 140, 248, 0.55);
      margin-top: 2px;
    }

    /* ── Feature list ────────────────────────────────────────────────────────── */
    .features { padding: 4px 0; }

    .feature-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 11px 16px;
      cursor: pointer;
      transition: background 0.15s;
      user-select: none;
    }
    .feature-row:hover { background: rgba(99, 102, 241, 0.07); }

    .feature-icon {
      font-size: 19px;
      flex-shrink: 0;
      filter: drop-shadow(0 0 5px rgba(129, 140, 248, 0.45));
    }

    .feature-text { flex: 1; }

    .feature-name {
      font-size: 12.5px;
      font-weight: 500;
      color: #d1d9ec;
      line-height: 1.3;
    }

    .feature-desc {
      font-size: 10.5px;
      color: rgba(148, 163, 184, 0.55);
      margin-top: 2px;
    }

    /* ── Toggle switch ───────────────────────────────────────────────────────── */
    .toggle { position: relative; width: 36px; height: 21px; flex-shrink: 0; }
    .toggle input { position: absolute; opacity: 0; width: 0; height: 0; }

    .toggle-track {
      position: absolute;
      inset: 0;
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.07);
      border-radius: 11px;
      cursor: pointer;
      transition: background 0.2s, box-shadow 0.2s;
    }
    .toggle-track::after {
      content: '';
      position: absolute;
      width: 17px;
      height: 17px;
      background: rgba(160, 174, 200, 0.65);
      border-radius: 50%;
      top: 1px;
      left: 1px;
      transition: transform 0.2s, background 0.2s;
    }

    .toggle input:checked + .toggle-track {
      background: rgba(99, 102, 241, 0.65);
      border-color: rgba(99, 102, 241, 0.35);
      box-shadow: 0 0 10px rgba(99, 102, 241, 0.35);
    }
    .toggle input:checked + .toggle-track::after {
      transform: translateX(15px);
      background: #fff;
    }

    /* ── Footer ──────────────────────────────────────────────────────────────── */
    .footer {
      padding: 9px 16px;
      border-top: 1px solid rgba(255, 255, 255, 0.04);
      font-size: 10px;
      color: rgba(129, 140, 248, 0.28);
      text-align: center;
      letter-spacing: 0.4px;
    }
  </style>
</head>
<body>

  <div class="header">
    <div class="header-inner">
      <div class="logo">✦</div>
      <div>
        <div class="app-name">Kimi Polaris</div>
        <div class="app-version">v0.1.0</div>
      </div>
    </div>
  </div>

  <div class="features">
    <label class="feature-row" for="toggle-nav">
      <div class="feature-icon">☽</div>
      <div class="feature-text">
        <div class="feature-name">长文时间线导航</div>
        <div class="feature-desc">在右侧显示对话的回复大纲</div>
      </div>
      <div class="toggle">
        <input type="checkbox" id="toggle-nav">
        <span class="toggle-track"></span>
      </div>
    </label>
  </div>

  <div class="footer">✦ &nbsp; 仅在 www.kimi.com 生效 &nbsp; ☽</div>

  <script src="popup.js"></script>
</body>
</html>
